version: '2'
services:
  portainer:
    image: portainer/portainer-ce:alpine-sts
    restart: always
    ports:
      - 9443:9443/tcp
      - 8000:8000/tcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume1/docker/portainer/data:/data:rw
networks:
  default:
    portainer_network:
