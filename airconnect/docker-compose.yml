version: '2'
services:
  airconnect:
    container_name: airconnect
    image: 1activegeek/airconnect
    restart: unless-stopped
    environment:
      - AIRCAST_VAR=-x /config/config.xml
      - AIRUPNP_VAR=kill
    network_mode: host
    hostname: airconnect
    volumes:
      - airconnect_config:/config
volumes:
  airconnect_config:
